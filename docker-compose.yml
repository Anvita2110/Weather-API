version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  weather-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WEATHER_API_KEY=${WEATHER_API_KEY}
    depends_on:
      - redis

volumes:
  redis_data:
